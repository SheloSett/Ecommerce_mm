# ──────────────────────────────────────────────────────────────────────────────
# CONFIGURACIÓN NGINX PARA VPS HOSTINGER
# Ubicación en el VPS: /etc/nginx/sites-available/igwtstore
# Activar con: sudo ln -s /etc/nginx/sites-available/igwtstore /etc/nginx/sites-enabled/
# Verificar: sudo nginx -t
# Recargar: sudo systemctl reload nginx
#
# IMPORTANTE: cambiar igwtstore.com.ar por tu dominio real antes de usar.
# El SSL se agrega después con certbot (ver DEPLOY.md).
# ──────────────────────────────────────────────────────────────────────────────

# ──── HTTP → HTTPS redirect (certbot lo agrega automáticamente al pedir SSL) ──
server {
    listen 80;
    listen [::]:80;
    server_name igwtstore.com.ar www.igwtstore.com.ar;

    # Para que certbot pueda validar el dominio en el primer run
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás redirige a HTTPS (certbot lo configura automáticamente)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ──── HTTPS — frontend estático + proxy al backend Node ───────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name igwtstore.com.ar www.igwtstore.com.ar;

    # SSL — certbot agrega estas líneas automáticamente al correr:
    #   sudo certbot --nginx -d igwtstore.com.ar -d www.igwtstore.com.ar
    # ssl_certificate     /etc/letsencrypt/live/igwtstore.com.ar/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/igwtstore.com.ar/privkey.pem;

    # ──── Frontend: archivos estáticos del build de Vite ─────────────────────
    root /var/www/igwtstore/frontend;
    index index.html;

    # SPA routing: cualquier ruta no-API sirve index.html (React Router se encarga)
    location / {
        try_files $uri $uri/ /index.html;

        # No cachear index.html para que el browser siempre reciba el nuevo build
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Cache largo para assets con hash en el nombre (inmutables)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ──── Backend API: proxy a Node.js corriendo en localhost:4000 ────────────
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeouts altos para SSE / requests largos (webhook MP puede tardar)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        # No bufferear respuestas SSE (real-time)
        proxy_buffering off;
    }

    # ──── Compresión gzip — ahorra ancho de banda ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ──── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/igwtstore-access.log;
    error_log  /var/log/nginx/igwtstore-error.log;

    # ──── Tamaño máximo de upload (productos con varias imágenes) ─────────────
    client_max_body_size 25M;
}
