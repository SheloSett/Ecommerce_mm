# version: "3.9"  # Comentado: el atributo version es obsoleto en versiones modernas de Docker Compose

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"  # Cambiado a 5433 porque el 5432 ya está en uso por otra instancia de PostgreSQL en el host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ecommerce_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ecommerce_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - ecommerce_net

  # Backup automático de PostgreSQL: genera un .sql.gz diario en ./backups/
  # Retención: 7 backups diarios, 4 semanales, 6 mensuales (auto-rotación)
  pg-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: ecommerce_backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "59 23 * * *"   # Todos los días a las 23:59
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    networks:
      - ecommerce_net

volumes:
  postgres_data:

networks:
  ecommerce_net:
    driver: bridge
