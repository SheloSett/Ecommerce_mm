server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca se cachea — así el browser siempre obtiene los nuevos hashes de JS/CSS
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    # Necesario para React Router: cualquier ruta no encontrada sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos con hash en el nombre (inmutables por naturaleza)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
